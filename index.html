<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>KeibaAI</title>
<style>
:root{--bg:#0b1020;--bg2:#141b31;--bd:#2a3553;--tx:#e8ecf5;--sub:#8ea0bd;--gold:#c8a84b}
*{box-sizing:border-box;margin:0}body{background:var(--bg);color:var(--tx);
font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:15px;
line-height:1.55;padding:14px;max-width:640px;margin:0 auto}
h1{font-size:1.15rem}h1 small{color:var(--gold);font-weight:600}
h2{font-size:.95rem;margin:18px 0 8px;color:var(--gold)}h2 small{color:var(--sub);font-weight:400}
.gen{color:var(--sub);font-size:.72rem;margin:4px 0 8px}
.stat{display:flex;flex-wrap:wrap;gap:6px 14px;background:var(--bg2);border:1px solid var(--bd);
border-radius:10px;padding:8px 12px;font-size:.78rem}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rname{color:var(--sub);font-size:.8rem;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pt{color:var(--sub);font-size:.74rem}
.tier{border:1px solid;border-radius:8px;padding:0 7px;font-size:.72rem;font-weight:800}
.axis{color:#f59e0b;font-size:.72rem;margin-bottom:4px}
.hrow{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:.86rem}
.mk{width:1.2em}.ub{background:var(--gold);color:#0a0d16;border-radius:6px;padding:0 5px;
font-size:.72rem;font-weight:700;min-width:1.7em;text-align:center}
.hn{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wp{font-weight:700;min-width:3em;text-align:right}.od{color:var(--sub);font-size:.78rem;min-width:4em;text-align:right}
.tag{font-size:.62rem;border-radius:5px;padding:0 4px;font-weight:700}
.tag.gold{background:rgba(200,168,75,.16);color:var(--gold)}
.tag.red{background:rgba(239,68,68,.14);color:#f87171}
.w5leg{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;
margin-bottom:5px;font-size:.8rem}
details.card>summary{list-style:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
details.card>summary::-webkit-details-marker{display:none}
.arrow{margin-left:auto;color:var(--sub);transition:transform .2s}
details[open] .arrow{transform:rotate(180deg)}
.more{color:var(--sub);font-size:.68rem;text-align:center;padding-top:5px}
details[open] .more{display:none}
.cbody{border-top:1px solid var(--bd);margin-top:8px;padding-top:4px}
.cbody h3{font-size:.82rem;color:var(--gold);margin:8px 0 5px}
.uma{width:100%;border-collapse:collapse;font-size:.8rem}
.uma th{color:var(--sub);font-weight:600;font-size:.68rem;text-align:left;padding:2px 4px;
border-bottom:1px solid var(--bd)}
.uma td{padding:4px;border-bottom:1px solid rgba(42,53,83,.5);vertical-align:middle}
.uma td.r{text-align:right;white-space:nowrap}
.uma td.nm{max-width:0;width:52%}
.sub2{display:block;color:var(--sub);font-size:.66rem}
.wub{display:inline-block;min-width:1.7em;text-align:center;border-radius:5px;
padding:0 3px;font-size:.74rem;font-weight:700;border:1px solid rgba(0,0,0,.25)}
.brec{display:inline-block;border:1px solid;border-radius:8px;padding:2px 10px;
font-size:.78rem;font-weight:700;margin-bottom:6px}
.strat{background:rgba(20,27,49,.6);border:1px solid var(--bd);border-radius:8px;
padding:7px 9px;margin-bottom:6px}
.sname{font-size:.78rem;font-weight:700;margin-bottom:4px}
.sdesc{color:var(--sub);font-weight:400;font-size:.68rem;margin-left:6px}
.bline{display:flex;align-items:center;gap:6px;font-size:.78rem;padding:2px 0}
.bt{background:var(--bd);border-radius:5px;padding:0 6px;font-size:.68rem;white-space:nowrap}
.bl{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bam{color:var(--gold);font-size:.72rem;white-space:nowrap}
.dim{color:var(--sub);font-size:.74rem}footer{margin:20px 0 10px}
#gate{display:flex;flex-direction:column;gap:10px;align-items:center;padding-top:18vh}
#gate input{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);
padding:10px 14px;font-size:1rem;width:230px;text-align:center}
#gate button{background:var(--gold);border:none;border-radius:10px;color:#0a0d16;
padding:10px 22px;font-weight:700;font-size:.95rem}
#gate .err{color:#f87171;font-size:.8rem;min-height:1.2em}
</style></head><body>
<div id="gate" style="display:none">
  <div style="font-size:2rem">🏇</div><div>KeibaAI 予想ビューア</div>
  <input id="pw" type="password" placeholder="閲覧キー" onkeydown="if(event.key==='Enter')manual()">
  <button onclick="manual()">開く</button><div class="err" id="gerr"></div>
</div>
<div id="app"></div>

async function deriveKey(pass, salt){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:200000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
function b64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
async function tryOpen(pass){
  try{
    const key = await deriveKey(pass, b64(PAYLOAD.salt));
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(PAYLOAD.iv)}, key, b64(PAYLOAD.ct));
    document.getElementById('app').innerHTML = new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
    localStorage.setItem('kp_key', pass);
    return true;
  }catch(e){ return false; }
}
async function boot(){
  const u = new URL(location.href);
  const qk = u.searchParams.get('key');
  if(qk){ u.searchParams.delete('key'); history.replaceState(null,'',u.toString()); }
  for(const k of [qk, localStorage.getItem('kp_key')]){
    if(k && await tryOpen(k)) return;
  }
  document.getElementById('gate').style.display='flex';
}
async function manual(){
  const v = document.getElementById('pw').value.trim();
  if(!(await tryOpen(v))) document.getElementById('gerr').textContent = 'キーが違います';
}
boot();
